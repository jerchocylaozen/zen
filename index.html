<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pinoy Flavors</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}

body{background:#f4f4f4}

header{
background:linear-gradient(135deg,#d32f2f,#ff9800);
color:white;
text-align:center;
padding:40px 20px;
}

header h1{font-size:3rem}

.container{width:90%;max-width:1200px;margin:auto;padding:40px 0}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{width:100%;height:180px;object-fit:cover}

.card-content{padding:15px}

.btn{
background:#d32f2f;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:8px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.7);
overflow:auto;
}

.modal-content{
background:white;
width:90%;
max-width:800px;
margin:50px auto;
padding:25px;
border-radius:10px;
position:relative;
}

.close{
position:absolute;
right:15px;top:10px;
font-size:28px;
cursor:pointer;
}

h2{color:#d32f2f}
h3{color:#ff9800;margin-top:15px}

.meta{
font-size:14px;
color:#555;
margin:8px 0 15px;
}

ul,ol{margin-left:20px;margin-top:10px}

</style>
</head>

<body>

<div class="grid" id="grid"></div>

<span class="close" onclick="closeModal()">&times;</span>

const grid=document.getElementById("grid");

grid.innerHTML=recipes.map((r,i)=>`
<div class="card">
<img src="${r.img}">
<div class="card-content">
<h3>${r.name}</h3>
<button class="btn" onclick="openRecipe(${i})">View Recipe</button>
</div>
</div>
`).join("");

function openRecipe(i){
document.getElementById("content").innerHTML=recipes[i].recipe;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
if(e.target.id==="modal") closeModal();
}
